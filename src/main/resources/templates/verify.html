<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify Email - Smart Task</title>
    <link rel="stylesheet" th:href="@{/logreg.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="auth-body">

<div class="auth-container">

    <div class="auth-left">
        <h1>Email Verification 📩</h1>
        <p>
            We have sent a 6-digit OTP to your email.
            Please enter it below to activate your account.
        </p>
    </div>

    <div class="auth-card">
        <h2>Verify OTP</h2>

        <form th:action="@{/verify}" method="post">

            <input type="email" name="email" placeholder="Enter your email" required>

            <input type="text" name="otp" placeholder="Enter OTP" maxlength="6" required>

            <button type="submit" class="auth-btn">Verify Account</button>

        </form>

        <p class="auth-link">
            Didn't receive OTP?
            <a href="/resend-otp">Resend</a>
        </p>

    </div>

</div>

</body>
</html>
