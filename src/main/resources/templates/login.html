<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Smart Task</title>
    <link rel="stylesheet" th:href="@{/login.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="auth-body">

<div class="auth-container">

    <div class="auth-left">
        <h1>Welcome Back 👋</h1>
        <p>Login to continue managing your smart tasks with automation and voice power.</p>
    </div>

    <div class="auth-card">
        <h2>Login</h2>

        <form th:action="@{/login}" method="post" autocomplete="off">
            <input type="text" style="display:none">
            <input type="password" style="display:none">

            <input type="email" name="email" placeholder="Email Address" required autocomplete="username">

            <div class="password-wrapper">
    <input type="password" id="loginPassword"
           name="password"
           placeholder="Password" required autocomplete="current-password">
    <span class="toggle-password" onclick="toggleLoginPassword()">👁</span>
</div>

            <button type="submit" class="auth-btn">Login</button>

        </form>

        <p class="auth-link">
            Don't have an account?
            <a href="/register">Register Here</a>
        </p>
    </div>

</div>
<script>
function toggleLoginPassword() {
    const field = document.getElementById("loginPassword");
    field.type = field.type === "password" ? "text" : "password";
}
</script>
</body>
</html>
